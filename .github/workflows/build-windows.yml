name: Manual Build Windows EXE
on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-2022
    env:
      npm_config_python: python3
      npm_config_msvs_version: 2022
      # 🔥 只留这个，禁止全局编译，不影响任何模块
      CI: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # ####################################################################
      # 🔥 🔥 🔥 核心：安装时 禁止编译 sharp！！！
      # ####################################################################
      - name: Install dependencies (NO SHARP BUILD)
        run: |
          npm ci --ignore-scripts

      # ####################################################################
      # 🔥 只编译 uiohook-napi，完全不碰 sharp
      # ####################################################################
      - name: ONLY build uiohook-napi (super fast)
        run: |
          npx --yes node-gyp rebuild --directory=node_modules/uiohook-napi --arch=x64

      - name: Build all assets
        run: npm run build

      - name: Build Windows EXE
        run: npm run build-w

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: out/**
