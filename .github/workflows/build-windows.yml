name: Manual Build Windows EXE

on:
  workflow_dispatch:   # 只手动触发构建

jobs:
  build-windows:
    runs-on: windows-latest

    # 这里通过环境变量配置 node-gyp，代替 npm config（npm 9+ 已取消）
    env:
      npm_config_python: python3      # 指定 Python 路径
      npm_config_msvs_version: 2022   # 指定 Visual Studio 版本（MSVC）

    steps:
      # 1. 拉取源码
      - name: Checkout source code
        uses: actions/checkout@v4   # 升级到 v4，支持 Node.js 24

      # 2. 安装 Node.js 并缓存 ~/.npm（npm 缓存）
      - name: Setup Node.js
        uses: actions/setup-node@v4   # 升级到 v4
        with:
          node-version: 18
          cache: "npm"   # 自动缓存 npm 下载依赖

      # 3. 安装 Python（用于 node-gyp 编译 native 模块）
      - name: Setup Python
        uses: actions/setup-python@v5   # 升级到 v5
        with:
          python-version: '3.10'

      # 4. 缓存 node_modules 来避免重复安装和编译 native 模块
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      # 5. 安装依赖（如缓存命中则跳过）
      - name: Install dependencies
        run: |
          if [ ! -d "node_modules" ]; then
            npm ci
          fi

      # 6. 提前编译 native 模块，避免 build-w 重新编译
      - name: Prebuild native modules for Windows
        run: npx electron-builder install-app-deps --arch x64

      # 7. 执行你的构建流程（先 build，再 build-w）
      - name: Build all assets
        run: npm run build

      - name: Build Windows EXE
        run: npm run build-w

      # 8. 上传构建产物到 GitHub Actions Artifacts（改为 v4）
      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: out/**   # 根据你的输出路径修改