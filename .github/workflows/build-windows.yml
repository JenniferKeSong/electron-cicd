name: Manual Build Windows EXE
on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      # 提前编译原生模块，不卡住
      - name: Rebuild uiohook-napi
        run: npx @electron/rebuild -f -w uiohook-napi

      # 🔥 先看当前目录有什么
      - name: List current folder
        run: dir

      # 执行打包
      - name: Build Windows
        run: npm run build-w

      # 🔥 全局搜索所有 exe（不管在哪个文件夹都能找到）
      - name: Find ALL exe files
        run: Get-ChildItem -Recurse -Filter *.exe

      # 🔥 自动上传所有找到的 exe（最稳）
      - name: Upload all EXE files
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: '**/*.exe'
