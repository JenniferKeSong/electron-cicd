name: Manual Build Windows EXE
on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-2022  # 更快的 Windows
    env:
      npm_config_python: python3
      npm_config_msvs_version: 2022
      # 🔥 强制 uiohook-napi 使用预编译（核心加速）
      npm_config_uiohook_napi_prebuild: true
      npm_config_arch: x64
      # 🔥 关闭冗余日志，进一步加速
      npm_config_loglevel: error
      CI: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: "npm"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: npm ci

      # 🔥 只编译 uiohook-napi，跳过所有其他原生模块
      - name: Fast rebuild uiohook-napi
        run: npx electron-rebuild -f -w uiohook-napi --arch x64

      - name: Build
        run: npm run build

      - name: Build EXE
        run: npm run build-w

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: out/**
