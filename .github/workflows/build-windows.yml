name: Manual Build Windows EXE

on:
  workflow_dispatch:   # 只手动触发构建

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      # 1. 拉取源码
      - name: Checkout source code
        uses: actions/checkout@v3

      # 2. 安装 Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # 3. 安装 Python（用于 node-gyp）
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 4. 配置 npm 使用 Python 和 VS 编译器
      - name: Configure npm for node-gyp
        run: |
          npm config set python python3
          npm config set msvs_version 2022

      # 5. 安装依赖
      - name: Install dependencies
        run: npm ci

      # 6. 执行你的构建流程（先build，再build-w）
      - name: Build all assets
        run: npm run build

      - name: Build Windows EXE
        run: npm run build-w

      # 7. 上传构建产物到 GitHub Actions Artifacts
      - name: Upload Windows EXE
        uses: actions/upload-artifact@v3
        with:
          name: windows-exe
          path: out/**   # 根据你的输出路径修改