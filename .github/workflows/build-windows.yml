name: Manual Build Windows EXE

on:
  workflow_dispatch:   # 只手动触发构建

jobs:
  build-windows:
    runs-on: windows-latest

    env:
      npm_config_python: python3
      npm_config_msvs_version: 2022
      # 镜像加速
      ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
      ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: "npm"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 🔥 只缓存原生模块（不会破坏 sharp，不会报权限错）
      - name: Cache native modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules/uiohook-napi/build
            node_modules/uiohook-napi/prebuilds
          key: ${{ runner.os }}-native-${{ hashFiles('package-lock.json') }}-x64

      # 安装依赖（删除了危险的判断逻辑，避免权限错误）
      - name: Install dependencies
        run: npm ci

      # 编译原生模块（只会编译 uiohook-napi，缓存命中瞬间完成）
      - name: Prebuild native modules for Windows
        run: npx electron-builder install-app-deps --arch x64

      # 构建
      - name: Build all assets
        run: npm run build

      - name: Build Windows EXE
        run: npm run build-w

      # 上传产物
      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: out/**
