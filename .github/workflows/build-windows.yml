name: Manual Build Windows EXE

on:
  workflow_dispatch:   # 只手动触发构建

jobs:
  build-windows:
    runs-on: windows-latest

    env:
      npm_config_python: python3
      npm_config_msvs_version: 2022

    steps:
      # 1. 拉取源码
      - name: Checkout source code
        uses: actions/checkout@v4

      # 2. 安装 Node.js 并缓存 ~/.npm
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: "npm"

      # 3. 安装 Python（用于 node-gyp）
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 4. 缓存 node_modules 来避免重复安装和编译 native 模块
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      # 5. 安装依赖（如缓存命中则跳过）
      - name: Install dependencies
        shell: bash            # 强制用 bash 语法
        run: |
          if [ ! -d "node_modules" ]; then
            npm ci
          fi

      # 6. 提前编译 native 模块，避免 build-w 重新编译
      - name: Prebuild native modules for Windows
        run: npx electron-builder install-app-deps --arch x64

      # 7. 执行你的构建流程（先 build，再 build-w）
      - name: Build all assets
        run: npm run build

      - name: Build Windows EXE
        run: npm run build-w

      # 8. 上传构建产物
      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: out/**   # 根据你的输出路径修改
