name: Manual Build Windows EXE
on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      # 🔥 提前编译 uiohook-napi，绝对不卡
      - name: Rebuild native module
        run: npx @electron/rebuild -f -w uiohook-napi

      # 🔥 执行打包
      - name: Build Windows
        run: npm run build-w

      # 🔥 列出所有打包结果（你能在日志里看到exe在哪）
      - name: Show all output files
        run: Get-ChildItem -Recurse -Path "out/**/*.exe"

      # 🔥 上传产物（你一定能在页面底部看到下载按钮）
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: out/**/*.exe
