name: Manual Build Windows EXE
on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-2022
    env:
      CI: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      # 🔥 关键：先编译好原生模块（解决卡死）
      - name: Install & compile native modules
        run: |
          npm install
          npx electron-rebuild -f -w uiohook-napi

      # 🔥 直接打包，不再重新编译！
      - name: Build Windows EXE
        run: npm run build-w

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/*.exe
